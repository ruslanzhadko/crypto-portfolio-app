version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptoportfolio-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cryptoportfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cryptoportfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
