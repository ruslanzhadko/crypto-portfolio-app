sonar.projectKey=ruslanzhadko_crypto-portfolio-app
sonar.organization=ruslanzhadko

sonar.projectName=CryptoPortfolio
sonar.projectVersion=1.0

# ── Аналізований production-код ──
sonar.sources=app,lib,components

# ── Тести (юніт-тести Vitest) ──
sonar.tests=app,lib,components
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# ── Виключення з основного аналізу (не production-логіка) ──
sonar.exclusions=node_modules/**,.next/**,coverage/**,**/*.test.ts,**/*.test.tsx,prisma/migrations/**

# ── Покриття: lcov, згенерований Vitest (provider v8) ──
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Scope метрики Coverage ──
# Vitest збирає покриття ЛИШЕ по 4 чистих (без I/O) модулях бізнес/утиліт-шару.
# Інакше Sonar рахував би Coverage по всьому sonar.sources і вважав решту 0%.
# Тому ВСЕ, крім цих 4 файлів, виключаємо з РОЗРАХУНКУ ПОКРИТТЯ.
# ВАЖЛИВО: це НЕ звужує статичний аналіз (баги/smells/дублікати) — він і далі
# працює на весь sonar.sources=app,lib,components. coverage.exclusions впливає
# ТІЛЬКИ на метрику Coverage. Sonar не підтримує негацію (!), тож "решту"
# перелічуємо явно, навмисно НЕ включаючи 4 тестовані модулі.
sonar.coverage.exclusions=\
  app/**,\
  components/**,\
  lib/db/**,\
  lib/api/**,\
  lib/auth/**,\
  lib/cron/**,\
  lib/env.ts,\
  lib/utils/cn.ts,\
  lib/services/ankr.ts,\
  lib/services/coingecko.ts,\
  lib/services/moralis.ts,\
  lib/services/open-interest.ts,\
  lib/services/portfolio.ts,\
  lib/services/portfolio-sync.ts,\
  lib/services/price-feed.ts,\
  lib/services/telegram.ts,\
  lib/services/wallet-sync.ts

sonar.sourceEncoding=UTF-8
